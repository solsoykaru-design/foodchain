<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FoodChain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--tg-theme-bg-color, #f5f5f5); color: var(--tg-theme-text-color, #222); }
    .header { position: sticky; top: 0; z-index: 10; background: var(--tg-theme-header-bg-color, #fff); padding: 12px 16px; border-bottom: 1px solid var(--tg-theme-hint-color, #e0e0e0); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .cart-icon { position: relative; cursor: pointer; padding: 4px; }
    .cart-badge { position: absolute; top: -4px; right: -6px; background: var(--tg-theme-button-color, #2481cc); color: #fff; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .content { padding: 12px; max-width: 600px; margin: 0 auto; }
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .cat-card { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: 14px; padding: 14px; text-align: center; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: transform .12s; }
    .cat-card:active { transform: scale(.96); }
    .cat-card .emoji { font-size: 28px; display: block; margin-bottom: 6px; }
    .cat-card .name { font-size: 13px; font-weight: 600; }
    .cat-card .count { font-size: 11px; color: var(--tg-theme-hint-color, #999); margin-top: 2px; }
    .dish-card { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .dish-img { width: 64px; height: 64px; border-radius: 10px; background: #f0f0f0; flex-shrink: 0; object-fit: cover; }
    .dish-info { flex: 1; min-width: 0; }
    .dish-name { font-size: 14px; font-weight: 600; }
    .dish-desc { font-size: 12px; color: var(--tg-theme-hint-color, #888); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .dish-price { font-size: 15px; font-weight: 700; color: var(--tg-theme-button-color, #2481cc); margin-top: 4px; }
    .add-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--tg-theme-button-color, #2481cc); color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .add-btn:active { opacity: .7; }
    .back-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border: none; border-radius: 8px; background: var(--tg-theme-secondary-bg-color, #eee); color: var(--tg-theme-text-color, #222); font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .back-btn:active { opacity: .7; }
    .empty { text-align: center; padding: 40px 16px; color: var(--tg-theme-hint-color, #999); font-size: 14px; }
    .loading { text-align: center; padding: 60px 16px; color: var(--tg-theme-hint-color, #999); }
    .loading .spinner { width: 32px; height: 32px; border: 3px solid var(--tg-theme-hint-color, #ddd); border-top-color: var(--tg-theme-button-color, #2481cc); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 20; display: flex; align-items: flex-end; }
    .modal { width: 100%; max-height: 80vh; background: var(--tg-theme-bg-color, #fff); border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--tg-theme-hint-color, #eee); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item .name { flex: 1; font-size: 14px; font-weight: 600; }
    .cart-item .price { font-size: 14px; font-weight: 700; }
    .cart-qty { display: flex; align-items: center; gap: 8px; }
    .cart-qty button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--tg-theme-hint-color, #ddd); background: transparent; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cart-qty button:active { opacity: .6; }
    .cart-qty span { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
    .checkout-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; }
    .checkout-btn:active { opacity: .8; }
    .total-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 16px; font-weight: 700; border-top: 2px solid var(--tg-theme-hint-color, #eee); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="pageTitle">Меню</h1>
    <div class="cart-icon" onclick="showCart()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge" id="cartBadge" style="display:none">0</span>
    </div>
  </div>
  <div class="content" id="content"></div>

  <script>
    // Ensure tg.ready() is always called, even on errors
    let tg = null;
    try {
      if (window.Telegram?.WebApp) {
        tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
      }
    } catch(e) { console.error(e); }
    // Fallback: call ready() on load and after a timeout
    function ensureTgReady() {
      if (tg) return;
      try {
        if (window.Telegram?.WebApp) {
          tg = window.Telegram.WebApp;
          tg.expand();
          tg.ready();
        }
      } catch(e) {}
    }
    document.addEventListener('DOMContentLoaded', ensureTgReady);
    setTimeout(ensureTgReady, 1000);
    setTimeout(ensureTgReady, 3000);

    // Catch global errors to prevent white screen
    window.onerror = function(msg, url, line) {
      document.getElementById('content').innerHTML = '<div class="empty">⚠️ Ошибка: ' + msg + ' (строка ' + line + ')</div>';
    };

    const API_BASE = '';
    let categories = [], dishes = [], cart = [], curCat = null;

    async function api(url) {
      const r = await fetch(API_BASE + url);
      const d = await r.json();
      return Array.isArray(d) ? d : (d.value || d.dishes || d.categories || []);
    }

    function $(id) { return document.getElementById(id); }

    function showLoading() { $('content').innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка...</div>'; }

    async function loadCategories() {
      showLoading();
      try {
        categories = await api('/api/menu-categories');
        renderCategories();
      } catch { $('content').innerHTML = '<div class="empty">Ошибка загрузки меню</div>'; }
    }

    function renderCategories() {
      if (!categories.length) { $('content').innerHTML = '<div class="empty">Меню пусто</div>'; return; }
      const emojis = ['🍣','🍱','🍜','🥟','🍛','🥗','🍤','🍙','🥠','🍡','🥮','🍘'];
      let html = '<div class="cat-grid">';
      categories.forEach((c,i) => { html +=
        `<div class="cat-card" onclick="loadDishes(${c.id})">
          <span class="emoji">${emojis[i%emojis.length]}</span>
          <div class="name">${c.name || c.Name}</div>
          <div class="count">${c.dishCount || ''} блюд</div>
        </div>`;
      });
      html += '</div>';
      $('content').innerHTML = html;
      $('pageTitle').textContent = 'Меню';
      curCat = null;
    }

    async function loadDishes(catId) {
      showLoading();
      try {
        dishes = await api('/api/dishes?category_id=' + catId);
        curCat = catId;
        renderDishes();
      } catch { $('content').innerHTML = '<div class="empty">Ошибка загрузки блюд</div>'; }
    }

    function renderDishes() {
      const cat = categories.find(c => (c.id || c.Id) === curCat);
      $('pageTitle').textContent = cat ? (cat.name || cat.Name) : 'Блюда';
      if (!dishes.length) { $('content').innerHTML = '<button class="back-btn" onclick="loadCategories()">← Назад</button><div class="empty">Нет блюд в этой категории</div>'; return; }
      let html = '<button class="back-btn" onclick="loadCategories()">← Назад</button>';
      dishes.forEach(d => {
        const name = d.name || d.Name || '';
        const desc = d.description || d.Description || '';
        const price = d.price || d.Price || 0;
        const img = d.image_url || d.ImageUrl || '';
        html +=
        `<div class="dish-card">
          ${img ? `<img class="dish-img" src="${img}" alt="">` : '<div class="dish-img"></div>'}
          <div class="dish-info">
            <div class="dish-name">${name}</div>
            ${desc ? `<div class="dish-desc">${desc}</div>` : ''}
            <div class="dish-price">${price} ₽</div>
          </div>
          <button class="add-btn" onclick="addToCart(${d.id || d.Id},'${name.replace(/'/g,"\\'")}',${price})">+</button>
        </div>`;
      });
      $('content').innerHTML = html;
    }

    function addToCart(id, name, price) {
      const existing = cart.find(i => i.id === id);
      if (existing) { existing.qty++; }
      else { cart.push({ id, name, price, qty: 1 }); }
      updateCartBadge();
    }

    function removeFromCart(id) {
      const idx = cart.findIndex(i => i.id === id);
      if (idx >= 0) {
        if (cart[idx].qty > 1) cart[idx].qty--;
        else cart.splice(idx, 1);
      }
      updateCartBadge();
      renderCartModal();
    }

    function updateCartBadge() {
      const total = cart.reduce((s,i) => s + i.qty, 0);
      const badge = $('cartBadge');
      if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
      else { badge.style.display = 'none'; }
    }

    function showCart() {
      if (!cart.length) return;
      let html = '<h2>Корзина</h2>';
      cart.forEach(i => {
        html +=
        `<div class="cart-item">
          <div class="name">${i.name}</div>
          <div class="price">${i.price * i.qty} ₽</div>
          <div class="cart-qty">
            <button onclick="removeFromCart(${i.id})">−</button>
            <span>${i.qty}</span>
            <button onclick="addToCart(${i.id},'${i.name.replace(/'/g,"\\'")}',${i.price})">+</button>
          </div>
        </div>`;
      });
      const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
      html += '<div class="total-row"><span>Итого</span><span>' + total + ' ₽</span></div>';
      html += '<button class="checkout-btn" onclick="checkout()">Оформить заказ</button>';
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = '<div class="modal">' + html + '</div>';
      document.body.appendChild(overlay);
    }

    function renderCartModal() {
      const overlay = document.querySelector('.modal-overlay');
      if (overlay) {
        overlay.querySelector('.modal').innerHTML = cart.length ? (() => {
          let h = '<h2>Корзина</h2>';
          cart.forEach(i => { h +=
            '<div class="cart-item"><div class="name">' + i.name + '</div><div class="price">' + (i.price * i.qty) + ' ₽</div><div class="cart-qty"><button onclick="removeFromCart(' + i.id + ')">−</button><span>' + i.qty + '</span><button onclick="addToCart(' + i.id + ',\'' + i.name.replace(/'/g,"\\'") + '\',' + i.price + ')">+</button></div></div>';
          });
          const t = cart.reduce((s,i) => s + i.price * i.qty, 0);
          h += '<div class="total-row"><span>Итого</span><span>' + t + ' ₽</span></div><button class="checkout-btn" onclick="checkout()">Оформить заказ</button>';
          return h;
        })() : '<h2>Корзина</h2><div class="empty">Корзина пуста</div>';
        overlay.querySelector('.modal').innerHTML += '';
      }
    }

    function checkout() {
      if (!tg) { document.querySelector('.modal') ? showErrorMsg('Оформите заказ через Telegram') : alert('Оформите заказ через Telegram'); return; }
      const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
      try {
        tg.sendData(JSON.stringify({ action: 'order', items: cart.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price })), total }));
        tg.close();
      } catch(e) { showErrorMsg('Ошибка отправки заказа'); }
    }
    function showErrorMsg(t) {
      const e = document.createElement('div');
      e.style.cssText = 'position:fixed;bottom:20px;left:16px;right:16px;background:#e74c3c;color:#fff;padding:14px;border-radius:12px;text-align:center;font-weight:600;z-index:99;';
      e.textContent = t;
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 3000);
    }

    loadCategories();
  </script>
</body>
</html>
