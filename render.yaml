services:
  - type: web
    name: foodchain
    env: node
    region: frankfurt
    buildCommand: npm install && VITE_APP=guest npx vite build && VITE_APP=admin npx vite build && VITE_APP=waiter npx vite build && VITE_APP=courier npx vite build && VITE_APP=kitchen npx vite build && cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
