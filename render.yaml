services:
  - type: web
    name: foodchain
    env: node
    region: frankfurt
    healthCheckPath: /api/health
    buildCommand: npm install && npm run build:waiter && npm run build:pos && cd server && npm install && cd portal-backend && npm install
    startCommand: cd server && node index.js
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: DATABASE_PATH
        value: /data/portal.db
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PORTAL_SYNC_KEY
        sync: false
