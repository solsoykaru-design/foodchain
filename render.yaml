services:
  - type: web
    name: foodchain
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && cd server && npm install && cd .. && npm run build:admin && npm run build:techcard
    startCommand: cd server && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: SUPPLIER_JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        value: sk-DkmyNm89NGUxfY92RiMIc4aGiGk9SVeqE7a3TFUxLYilSnL6jg1RrC2XFL1VbpYu
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ORIGINS
        value: "*"
