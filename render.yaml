# Render Blueprint for FoodChain
# 1. Create a Render account and connect this GitHub repo.
# 2. Render will auto-detect render.yaml and provision all services.
# 3. After first deploy, open Admin/POS/Manager and log in.

services:
  - type: web
    name: foodchain-api
    runtime: node
    region: frankfurt
    plan: standard
    autoDeploy: true
    buildCommand: npm install && cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /data
      - key: JWT_SECRET
        generateValue: true
      - key: SUPPLIER_JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    disk:
      name: foodchain-data
      mountPath: /data
      sizeGB: 5
    healthCheckPath: /api/health

  - type: static
    name: foodchain-admin
    runtime: static
    region: frankfurt
    autoDeploy: true
    buildCommand: npm install && npm run build:admin
    staticPublishPath: ./dist-admin
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: foodchain-api
          property: url

  - type: static
    name: foodchain-pos
    runtime: static
    region: frankfurt
    autoDeploy: true
    buildCommand: npm install && npm run build:pos
    staticPublishPath: ./dist-pos
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: foodchain-api
          property: url

  - type: static
    name: foodchain-manager
    runtime: static
    region: frankfurt
    autoDeploy: true
    buildCommand: npm install && npm run build:manager
    staticPublishPath: ./dist-manager
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: foodchain-api
          property: url
