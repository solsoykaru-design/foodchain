services:
  - type: web
    name: foodchain
    env: node
    region: frankfurt
    buildCommand: npm install && cd server && npm install && cd .. && cd portal/backend && npm install && cd ../frontend && npm install && cd ../.. && export VITE_APP=guest && npx vite build && export VITE_APP=admin && npx vite build && export VITE_APP=waiter && npx vite build && export VITE_APP=kitchen && npx vite build && export VITE_APP=courier && npx vite build && export VITE_APP=website && npx vite build && export VITE_APP=kiosk && npx vite build && export VITE_APP=techcard && npx vite build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
